  <main>
    <section class="contact-section">
      <h2>Contact Me</h2>

      <div class="contact-container">
        <div class="contact-info">
          <p><strong>Email:</strong> <a href="mailto:Rivvietsupport@gmail.com">Rivvietsupport@gmail.com</a></p>
          <p><strong>Location:</strong> Salt Lake City, Utah</p>
          <p><strong>GitHub:</strong> <a href="https://github.com/rivviet" target="_blank" rel="noopener noreferrer">https://github.com/rivviet</a></p>
          <p><strong>YouTube:</strong> <a href="https://www.youtube.com/@Rivviet" target="_blank" rel="noopener noreferrer">https://www.youtube.com/@Rivviet</a></p>
        </div>

        <form class="contact-form" action="#" method="post">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Your email" required>

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Your message..." required></textarea>

          <button type="submit">Send Message</button>
        </form>
      </div>
    </section>
  </main>

  <footer>
